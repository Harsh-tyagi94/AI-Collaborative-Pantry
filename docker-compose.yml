services:

  # ── Backend: Node.js + Express + Socket.io ───────────────────────────────────
  server:
    build:
      context: ./server        # Docker looks for server/Dockerfile
      dockerfile: Dockerfile
    container_name: pantry_server
    restart: unless-stopped
    ports:
      - "8000:8000"            # host:container
    env_file:
      - ./server/.env          # Loads your server .env file
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  # ── Frontend: React/Vite built → served by nginx ─────────────────────────────
  client:
    build:
      context: ./client        # Docker looks for client/Dockerfile
      dockerfile: Dockerfile
      args:
        # In Docker, nginx proxies /api → server:8000
        # So the browser just calls /api/v1 — no full URL needed
        VITE_BACKEND_URL: /api/v1
        VITE_WEBSOCKET_URL: /
    container_name: pantry_client
    restart: unless-stopped
    ports:
      - "80:80"                # Visit http://localhost in your browser
    depends_on:
      server:
        condition: service_healthy

# Both containers share this network and can reach
# each other by service name (e.g. http://server:8000)
networks:
  default:
    name: pantry_network