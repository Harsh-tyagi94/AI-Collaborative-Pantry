services:
  # 1. MongoDB - No code needed, Docker pulls the official image
  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Redis - For our real-time collaboration
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 3. Backend API
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://db:27017/collaborative_pantry
    depends_on:
      - db
      - redis
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  # 4. Frontend React
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/dist

volumes:
  mongo_data: