server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip (smaller files = faster loads) ──────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Cache hashed assets forever ───────────────────────────────
    # Vite adds a hash to every JS/CSS filename so this is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy /api/* → backend on port 8000 ───────────────────────
    # Matches VITE_BACKEND_URL=/api/v1 prefix
    location /api/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket proxy for Socket.io ─────────────────────────────
    # Your real-time room collaboration goes through here
    location /socket.io/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        # These two headers are REQUIRED for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        # Keep WebSocket alive (86400s = 24h)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── SPA fallback ───────────────────────────────────────────────
    # MUST be last. React Router handles /room/abc etc.
    # Without this, nginx returns 404 on page refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}